llm:
  model: qwen3.6:27b
  preserve_speakers: true
  prompt_template: |
    Analyze this transcript of a team meeting. 

    Glossary of correct names/projects: {{glossary}}

    Provide:
    1. **Summary** (3-5 bullet points)
    2. **Action items** (who is responsible for what)
    3. **Key decisions** made
    4. **Questions to ask next time** (prep for next 1:1)

    Transcript:
    {{transcript}}